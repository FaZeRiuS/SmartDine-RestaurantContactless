# Performance/Security Overrides for E2E Tests (Fixes localhost timeouts)
server.compression.enabled=false
server.servlet.session.cookie.secure=false
app.upload.dir=target/uploads
# Match production default so E2E does not force-close the emitter every 30s (reconnect storm in logs).
app.sse.timeout-ms=3600000
