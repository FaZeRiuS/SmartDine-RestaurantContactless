<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head}">
    <title>Мої замовлення — SmartDine</title>
</head>
<body>

<div th:replace="~{fragments/layout :: header}"></div>

<main class="container page-content">
    <div class="section-header fade-in-up">
        <h1 class="section-title"> Мої замовлення</h1>
        <p class="section-subtitle">Переглядайте статус активних та історію ваших минулих замовлень</p>
    </div>

    <div class="menu-tabs fade-in-up">
        <button type="button" class="menu-tab customer-order-tab active"
                th:attr="hx-get=@{/htmx/customer/orders(tab=active)}"
                hx-target="#customerOrdersRoot"
                hx-swap="innerHTML"
                data-tab="active">Активні</button>
        <button type="button" class="menu-tab customer-order-tab"
                th:attr="hx-get=@{/htmx/customer/orders(tab=past)}"
                hx-target="#customerOrdersRoot"
                hx-swap="innerHTML"
                data-tab="past">Минулі</button>
    </div>

    <div id="historyLoading" class="loading-overlay" style="display:none;">
        <div class="loading-spinner"></div>
        <span>Завантаження вашої історії...</span>
    </div>

    <div id="customerOrdersRoot" class="fade-in-up"
         th:attr="hx-get=@{/htmx/customer/orders(tab=active)}"
         hx-trigger="load"
         hx-swap="innerHTML">
        <div class="loading-overlay">
            <div class="loading-spinner"></div>
            <span>Завантаження вашої історії...</span>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: mobile-nav}"></div>
<div th:replace="~{fragments/layout :: footer}"></div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:src="@{/js/history.js}"></script>
</body>
</html>
