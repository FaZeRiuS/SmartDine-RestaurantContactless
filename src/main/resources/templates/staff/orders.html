<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Активні замовлення — SmartDine</title>
    <meta name="description" content="Панель управління замовленнями для персоналу SmartDine">
    <link rel="stylesheet" th:href="@{/css/public-bundle.css(v=2)}">
    <link rel="stylesheet" th:href="@{/css/admin.css}" sec:authorize="hasAnyRole('WAITER','CHEF','ADMINISTRATOR')">
</head>
<body>

<div th:replace="~{fragments/layout :: header}"></div>

<main>

<section class="section">
    <div class="container">
        <div class="section-header">
            <div>
                <h1 class="section-title"><span class="title-accent">&#128230;</span> Активні замовлення</h1>
                <p class="section-subtitle">Управляйте статусами замовлень клієнтів</p>
            </div>
        </div>

        <div id="staffBoardRoot"
             hx-get="/htmx/staff/orders/board?filter=all"
             hx-trigger="load"
             hx-swap="outerHTML">
            <div class="loading-overlay" id="ordersLoading">
                <div class="loading-spinner"></div>
                <span>Завантаження замовлень...</span>
            </div>
        </div>
    </div>
</section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:src="@{/js/staff.js}"></script>

</body>
</html>
