<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню — SmartDine</title>
    <meta name="description" content="Повне меню ресторану SmartDine. Переглядайте категорії, обирайте страви та додавайте у кошик.">
    <th:block th:replace="~{fragments/public-bundle-styles :: publicBundleLinks}"></th:block>
    <link rel="stylesheet" th:href="@{/css/admin.css}" sec:authorize="hasAnyRole('WAITER','CHEF','ADMINISTRATOR')">
</head>
<body>

<div th:replace="~{fragments/layout :: header}"></div>

<main>

<section class="section">
    <div class="container">
        <div class="section-header">
            <div>
                <h1 class="section-title"><span class="title-accent">📋</span> Меню ресторану</h1>
                <p class="section-subtitle">
                    Оберіть категорію та додайте страви у кошик
                    <span th:if="${tableNumber != null}" class="table-badge">
                         • Стіл №[[${tableNumber}]]
                    </span>
                </p>
            </div>
        </div>

        <!-- Menu Tabs -->
        <div class="menu-tabs mb-4" th:if="${menus != null && !menus.isEmpty()}">
            <button type="button" class="menu-tab" th:classappend="${selectedMenuId == null ? 'active' : ''}"
                    th:attr="hx-get=@{/htmx/menu/categories-body(filter='all',view='menu')}"
                    hx-target="#menuCategoriesRoot"
                    hx-swap="innerHTML"
                    hx-on:click="document.querySelectorAll('.menu-tabs .menu-tab').forEach(function(t){ t.classList.remove('active'); }); this.classList.add('active');">Усі категорії</button>
            <button type="button" class="menu-tab" th:each="menu : ${menus}"
                    th:classappend="${selectedMenuId != null && selectedMenuId == menu.id ? 'active' : ''}"
                    th:text="${menu.name}"
                    th:attr="hx-get=@{/htmx/menu/categories-body(filter=${menu.id},view='menu')}"
                    hx-target="#menuCategoriesRoot"
                    hx-swap="innerHTML"
                    hx-on:click="document.querySelectorAll('.menu-tabs .menu-tab').forEach(function(t){ t.classList.remove('active'); }); this.classList.add('active');">
                Категорія
            </button>
        </div>

        <div id="menuCategoriesRoot" hx-swap="innerHTML">
            <th:block th:with="menus=${menusForBody}" th:replace="~{fragments/public-menu-categories :: categoryBodies}"/>
        </div>

        <div class="empty-state" th:if="${menus == null || menus.isEmpty()}">
            <div class="empty-state-icon">📋</div>
            <h3>Меню поки порожнє</h3>
            <p class="text-muted">Меню ресторану ще не налаштовано</p>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: mobile-nav}"></div>
<div th:replace="~{fragments/layout :: footer}"></div>

<!-- Scripts: identity + SSE notifications (sse.js) -->
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
