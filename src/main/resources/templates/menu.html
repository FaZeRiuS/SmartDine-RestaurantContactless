<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(pageTitle='Меню', pageDescription='Повне меню ресторану SmartDine. Переглядайте категорії, обирайте страви та додавайте у кошик.')}">
</head>
<body>

<div th:replace="~{fragments/layout :: header}"></div>

<main>

<section class="section">
    <div class="container">
        <div class="section-header">
            <div>
                <h1 class="section-title"><span class="title-accent">📋</span> Меню ресторану</h1>
                <p class="section-subtitle">
                    Оберіть категорію та додайте страви у кошик
                    <span th:if="${tableNumber != null}" class="table-badge">
                         • Стіл №[[${tableNumber}]]
                    </span>
                </p>
            </div>
        </div>

        <details class="accordion mb-4" th:if="${(availableTags != null && !availableTags.isEmpty()) || (availableAllergens != null && !availableAllergens.isEmpty())}">
            <summary class="accordion-summary">Фільтри (теги / алергени)</summary>
            <form id="publicMenuFilters" class="filters-bar" onsubmit="return false;">
                <div th:if="${availableAllergens != null && !availableAllergens.isEmpty()}">
                    <div class="form-label">Виключити алергени</div>
                    <div class="d-flex" style="gap:10px; flex-wrap:wrap;">
                        <label class="form-check" th:each="a : ${availableAllergens}">
                            <input type="checkbox" name="excludeAllergens" th:value="${a}">
                            <span th:text="${a}">allergen</span>
                        </label>
                    </div>
                </div>

                <div th:if="${availableTags != null && !availableTags.isEmpty()}">
                    <div class="form-label">Показати теги (OR)</div>
                    <div class="d-flex" style="gap:10px; flex-wrap:wrap;">
                        <label class="form-check" th:each="t : ${availableTags}">
                            <input type="checkbox" name="includeTags" th:value="${t}">
                            <span th:text="${t}">tag</span>
                        </label>
                    </div>
                </div>

                <div th:if="${availableTags != null && !availableTags.isEmpty()}">
                    <div class="form-label">Приховати теги</div>
                    <div class="d-flex" style="gap:10px; flex-wrap:wrap;">
                        <label class="form-check" th:each="t : ${availableTags}">
                            <input type="checkbox" name="excludeTags" th:value="${t}">
                            <span th:text="${t}">tag</span>
                        </label>
                    </div>
                </div>
            </form>
        </details>

        <!-- Menu Tabs -->
        <div class="menu-tabs mb-4" th:if="${menus != null && !menus.isEmpty()}"
             data-swipe-target="#menuCategoriesRoot"
             aria-label="Категорії меню">
            <button type="button" class="menu-tab" th:each="menu : ${menus}"
                    th:classappend="${selectedMenuId != null && selectedMenuId == menu.id ? 'active' : ''}"
                    th:text="${menu.name}"
                    th:attr="hx-get=@{/htmx/menu/categories-body(filter=${menu.id},view='menu')}"
                    hx-target="#menuCategoriesRoot"
                    hx-swap="innerHTML"
                    hx-include="#publicMenuFilters"
                    hx-on:click="document.querySelectorAll('.menu-tabs .menu-tab').forEach(function(t){ t.classList.remove('active'); }); this.classList.add('active');">
                Категорія
            </button>
            <button type="button" class="menu-tab"
                    th:attr="hx-get=@{/htmx/menu/categories-body(filter='all',view='menu')}"
                    hx-target="#menuCategoriesRoot"
                    hx-swap="innerHTML"
                    hx-include="#publicMenuFilters"
                    hx-on:click="document.querySelectorAll('.menu-tabs .menu-tab').forEach(function(t){ t.classList.remove('active'); }); this.classList.add('active');">Усі категорії</button>
        </div>

        <div id="menuCategoriesRoot"
             th:if="${firstMenuId != null || selectedMenuId != null}"
             th:attr="hx-get=@{/htmx/menu/categories-body(filter=${selectedMenuId != null ? selectedMenuId : firstMenuId},view='menu')}"
             hx-trigger="load"
             hx-swap="innerHTML"
             hx-include="#publicMenuFilters">
            <div class="empty-state p-3">
                <p class="text-muted">Завантаження меню…</p>
            </div>
        </div>

        <div class="empty-state" th:if="${menus == null || menus.isEmpty()}">
            <div class="empty-state-icon">📋</div>
            <h3>Меню поки порожнє</h3>
            <p class="text-muted">Меню ресторану ще не налаштовано</p>
        </div>
        <div class="empty-state p-3" th:if="${menus != null && !menus.isEmpty() && selectedMenuId == null && firstMenuId == null}">
            <p class="text-muted">Меню зараз недоступне за часом</p>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: mobile-nav}"></div>
<div th:replace="~{fragments/layout :: footer}"></div>

<!-- Scripts: identity + SSE notifications (sse.js) -->
<div th:replace="~{fragments/layout :: scripts}"></div>

<script>
    (function () {
        var form = document.getElementById('publicMenuFilters');
        if (!form) return;
        form.addEventListener('change', function () {
            var active = document.querySelector('.menu-tabs .menu-tab.active') || document.querySelector('.menu-tabs .menu-tab');
            if (active) active.click();
        });
    })();
</script>
</body>
</html>
