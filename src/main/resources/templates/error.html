<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head}">
    <title>Помилка — SmartDine</title>
</head>
<body>

<div th:replace="~{fragments/layout :: header}"></div>

<main class="container page-content">
    <div class="error-page-container fade-in-up">
        <!-- Large background code for premium feel -->
        <div class="error-bg-watermark" th:text="${status != null ? status : '404'}">404</div>
        
        <div class="error-content-box">
            <span class="error-icon-pulse">⚠️</span>
            
            <h1 class="section-title mb-2">Ой! Щось пішло не так</h1>
            <p class="section-subtitle mb-4"
               th:text="${message != null ? message : 'Здається, сторінка, яку ви шукаєте, не існує або виникла помилка під час обробки запиту.'}">
                Сторінку не знайдено або виникла внутрішня помилка.
            </p>
            
            <div class="d-flex justify-center gap-2 mt-4">
                <a th:href="@{/}" class="btn btn-primary btn-lg">🏠 На головну</a>
                <a th:href="@{/menu}" class="btn btn-secondary btn-lg">📋 Перейти до меню</a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: mobile-nav}"></div>
<div th:replace="~{fragments/layout :: footer}"></div>

<!-- Scripts: identity + SSE notifications (sse.js) -->
<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>

</body>
</html>
