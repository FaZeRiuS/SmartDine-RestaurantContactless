<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="criticalHeader">
<!-- Navbar + global shell; include on all pages. Full rules still in base/layout/responsive. -->
<style id="critical-header">
:root {
    --bg-primary: #0a0a0a;
    --gold: #c9a96e;
    --gold-dark: #a88a4e;
    --gold-glow: rgba(201, 169, 110, 0.25);
    --text-primary: #f5f0e8;
    --text-secondary: #a09888;
    --text-muted: #948a7f;
    --border: rgba(255, 255, 255, 0.08);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-xl: 24px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --font-body: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --font-heading: 'Montserrat', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
    font-family: var(--font-body);
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
}

img { max-width: 100%; height: auto; display: block; }

.navbar {
    position: sticky;
    top: 0;
    z-index: 1100;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 1.25rem;
}

.navbar-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    height: 72px;
}

.navbar-brand {
    display: flex;
    align-items: center;
    height: 100%;
    text-decoration: none;
}

.brand-logo {
    height: 38px !important;
    width: auto !important;
    max-width: 200px;
    object-fit: contain;
}

.navbar-nav {
    display: flex;
    align-items: center;
    gap: 1rem;
    list-style: none;
}

.navbar-nav a {
    font-family: var(--font-body);
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text-secondary);
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    text-decoration: none;
    transition: color var(--transition), background var(--transition);
}

.navbar-nav a:hover {
    color: var(--text-primary);
    background: rgba(255, 255, 255, 0.08);
}

.navbar-nav a.active {
    color: var(--gold);
    background: rgba(201, 169, 110, 0.12);
    box-shadow: inset 0 0 0 1px rgba(201, 169, 110, 0.2);
}

.header-actions {
    display: flex;
    align-items: center;
    gap: 1rem;
    justify-content: flex-end;
    justify-self: end;
}

.header-icon-btn,
.header-profile-btn {
    text-decoration: none;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0.75rem;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 50px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.header-profile-desktop {
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.burger-menu-container {
    position: relative;
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.menu-toggle {
    display: flex;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-size: 1.25rem;
    cursor: pointer;
    padding: 0;
    width: 44px;
    height: 44px;
    border-radius: var(--radius-md);
    align-items: center;
    justify-content: center;
}

.nav-user-avatar {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--bg-primary);
    flex-shrink: 0;
}

.loyalty-badge-header {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    border: 1px solid var(--border);
    padding: 0.35rem 0.75rem;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.05);
    white-space: nowrap;
    font-size: 0.85rem;
}

.loyalty-balance-text {
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--text-primary);
}

.loyalty-cashback-text { font-size: 0.8rem; color: var(--text-muted); }

.navbar-burger { list-style: none; padding: 0; margin: 0; }

@media (max-width: 1024px) {
    .header-profile-desktop { display: none; }
}

@media (max-width: 768px) {
    .navbar {
        padding: 0 1rem;
        height: 64px !important;
        display: flex;
        align-items: center;
    }
    .navbar-inner {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 100% !important;
        padding: 0;
        grid-template-columns: none;
    }
    .navbar-nav { display: none !important; }
}
</style>
</th:block>

<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="criticalHero">
<!-- Home hero only; place after criticalHeader on the same page. -->
<style id="critical-hero">
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.hero {
    position: relative;
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    overflow: hidden;
}

.hero::before {
    content: '';
    position: absolute;
    top: -50%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, var(--gold-glow), transparent 70%);
    pointer-events: none;
}

.hero-content {
    max-width: 700px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
}

.hero h1 {
    font-family: var(--font-heading);
    font-size: 4rem;
    font-weight: 800;
    color: var(--gold);
    margin-bottom: 1.5rem;
    line-height: 1.1;
    letter-spacing: -1px;
    animation: fadeInUp 0.8s ease-out both;
}

.hero p {
    font-size: 1.15rem;
    color: var(--text-secondary);
    margin-bottom: 2rem;
    animation: fadeInUp 0.8s 0.15s ease-out both;
}

.hero-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--bg-primary);
    font-weight: 600;
    padding: 14px 32px;
    border-radius: var(--radius-xl);
    font-size: 1rem;
    text-decoration: none;
    transition: box-shadow var(--transition), transform var(--transition);
    animation: fadeInUp 0.8s 0.3s ease-out both;
}

@media (max-width: 1100px) {
    .hero h1 { font-size: 2.2rem; }
    .hero p { font-size: 1rem; }
}

@media (max-width: 768px) {
    .hero { padding: 2.5rem 1rem 1.5rem; }
    .hero h1 {
        font-size: 2.2rem;
        margin-bottom: 1rem;
    }
    .hero p {
        font-size: 1rem;
        margin-bottom: 1.5rem;
    }
    .hero-cta {
        padding: 10px 24px;
        font-size: 0.9rem;
    }
}

@media (max-width: 480px) {
    .hero { padding: 3rem 1rem 2rem; }
    .hero h1 { font-size: 1.8rem; }
}
</style>
</th:block>
