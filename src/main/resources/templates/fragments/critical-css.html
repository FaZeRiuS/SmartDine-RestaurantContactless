<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="criticalHeader">
<!-- Navbar + global shell; include on all pages. Full rules still in base/layout/responsive. -->
<style id="critical-header">
:root {
    --bg-primary: #0a0a0a;
    --gold: #c9a96e;
    --gold-dark: #a88a4e;
    --gold-glow: rgba(201, 169, 110, 0.25);
    --text-primary: #f5f0e8;
    --text-secondary: #a09888;
    --text-muted: #948a7f;
    --border: rgba(255, 255, 255, 0.08);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-xl: 24px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --font-body: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --font-heading: 'Montserrat', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
    font-family: var(--font-body);
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
}

img { max-width: 100%; height: auto; display: block; }

.navbar {
    position: sticky;
    top: 0;
    z-index: 1100;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 1.25rem;
}

.navbar-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    height: 72px;
}

.navbar-brand {
    display: flex;
    align-items: center;
    height: 100%;
    text-decoration: none;
}

.brand-logo {
    height: 38px !important;
    width: auto !important;
    max-width: 200px;
    object-fit: contain;
}

.navbar-nav {
    display: flex;
    align-items: center;
    gap: 1rem;
    list-style: none;
}

.navbar-nav a {
    font-family: var(--font-body);
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text-secondary);
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    text-decoration: none;
    transition: color var(--transition), background var(--transition);
}

.navbar-nav a:hover {
    color: var(--text-primary);
    background: rgba(255, 255, 255, 0.08);
}

.navbar-nav a.active {
    color: var(--gold);
    background: rgba(201, 169, 110, 0.12);
    box-shadow: inset 0 0 0 1px rgba(201, 169, 110, 0.2);
}

.header-actions {
    display: flex;
    align-items: center;
    gap: 1rem;
    justify-content: flex-end;
    justify-self: end;
}

.header-icon-btn,
.header-profile-btn {
    text-decoration: none;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0.75rem;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 50px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.header-profile-desktop {
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.burger-menu-container {
    position: relative;
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.menu-toggle {
    display: flex;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-size: 1.25rem;
    cursor: pointer;
    padding: 0;
    width: 44px;
    height: 44px;
    border-radius: var(--radius-md);
    align-items: center;
    justify-content: center;
}

.nav-user-avatar {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--bg-primary);
    flex-shrink: 0;
}

.loyalty-badge-header {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    border: 1px solid var(--border);
    padding: 0.35rem 0.75rem;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.05);
    white-space: nowrap;
    font-size: 0.85rem;
}

.loyalty-balance-text {
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--text-primary);
}

.loyalty-cashback-text { font-size: 0.8rem; color: var(--text-muted); }

.navbar-burger { list-style: none; padding: 0; margin: 0; }

@media (max-width: 1024px) {
    .header-profile-desktop { display: none; }
}

@media (max-width: 768px) {
    .navbar {
        padding: 0 1rem;
        height: 64px !important;
        display: flex;
        align-items: center;
    }
    .navbar-inner {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 100% !important;
        padding: 0;
        grid-template-columns: none;
    }
    .navbar-nav { display: none !important; }
}
</style>
</th:block>

<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="criticalHero">
<!-- Home hero only; place after criticalHeader on the same page. -->
<style id="critical-hero">
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.hero {
    position: relative;
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    overflow: hidden;
}

.hero::before {
    content: '';
    position: absolute;
    top: -50%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, var(--gold-glow), transparent 70%);
    pointer-events: none;
}

.hero-content {
    max-width: 700px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
}

.hero h1 {
    font-family: var(--font-heading);
    font-size: 4rem;
    font-weight: 800;
    color: var(--gold);
    margin-bottom: 1.5rem;
    line-height: 1.1;
    letter-spacing: -1px;
    animation: fadeInUp 0.8s ease-out both;
}

.hero p {
    font-size: 1.15rem;
    color: var(--text-secondary);
    margin-bottom: 2rem;
    animation: fadeInUp 0.8s 0.15s ease-out both;
}

.hero-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--bg-primary);
    font-weight: 600;
    padding: 14px 32px;
    border-radius: var(--radius-xl);
    font-size: 1rem;
    text-decoration: none;
    transition: box-shadow var(--transition), transform var(--transition);
    animation: fadeInUp 0.8s 0.3s ease-out both;
}

@media (max-width: 1100px) {
    .hero h1 { font-size: 2.2rem; }
    .hero p { font-size: 1rem; }
}

@media (max-width: 768px) {
    .hero { padding: 2.5rem 1rem 1.5rem; }
    .hero h1 {
        font-size: 2.2rem;
        margin-bottom: 1rem;
    }
    .hero p {
        font-size: 1rem;
        margin-bottom: 1.5rem;
    }
    .hero-cta {
        padding: 10px 24px;
        font-size: 0.9rem;
    }
}

@media (max-width: 480px) {
    .hero { padding: 3rem 1rem 2rem; }
    .hero h1 { font-size: 1.8rem; }
}
</style>
</th:block>

<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="criticalHomeDishSections">
<!-- Home only: dish sections match public-bundle (esp. 16:9 image box on mobile) before deferred CSS to avoid CLS. -->
<style id="critical-home-dishes">
:root {
    --bg-secondary: #111111;
    --bg-card: rgba(255, 255, 255, 0.04);
    --radius-lg: 16px;
    --font-price: 'Oswald', system-ui, -apple-system, 'Segoe UI', Roboto, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji', sans-serif;
    --shadow-gold: 0 4px 24px rgba(201, 169, 110, 0.15);
    --accent-red: #f87171;
    --border-gold: rgba(201, 169, 110, 0.3);
}

.container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 2rem;
}

.section {
    padding: 3rem 0;
}

.section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
}

.section-title {
    font-family: var(--font-heading);
    font-size: 2rem;
    font-weight: 600;
    color: var(--text-primary);
}

.section-title .title-accent {
    color: var(--gold);
}

.section-subtitle {
    color: var(--text-secondary);
    font-size: 0.95rem;
}

.dishes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.25rem;
}

.dish-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 0;
    position: relative;
    overflow: hidden;
}

.dish-card-content {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 1.25rem 1.25rem;
}

.dish-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-top: 1rem;
    margin-bottom: 0.75rem;
}

.dish-name {
    font-family: var(--font-heading);
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text-primary);
}

.dish-price {
    font-family: var(--font-price);
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--gold);
    white-space: nowrap;
    padding-left: 12px;
    letter-spacing: 0.5px;
}

.dish-image-container {
    width: 100%;
    aspect-ratio: 4 / 3;
    overflow: hidden;
    background: var(--bg-secondary);
    position: relative;
}

.dish-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: var(--bg-secondary);
    display: block;
}

.dish-image-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.5rem;
    background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
    opacity: 0.8;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.fade-in-up {
    animation: fadeInUp 0.4s ease-out both;
    will-change: transform, opacity;
}

.mt-1 { margin-top: 0.5rem !important; }
.mb-1 { margin-bottom: 0.5rem !important; }
.w-full { width: 100% !important; }

.text-muted {
    color: var(--text-muted);
    line-height: 1.35;
}

.text-sm { font-size: 0.9rem; }

.dish-description {
    font-size: 1.05rem;
    color: var(--text-secondary);
    margin-bottom: 0.5rem;
    line-height: 1.4;
}

.dish-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 0.5rem;
}

.dish-tag {
    font-size: 0.9rem;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: var(--radius-xl);
    background: rgba(201, 169, 110, 0.1);
    color: var(--gold);
    border: 1px solid rgba(201, 169, 110, 0.2);
}

.dish-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: auto;
}

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-family: var(--font-body);
    font-size: 1rem;
    font-weight: 700;
    padding: 12px 30px;
    border-radius: var(--radius-lg);
    border: none;
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
}

.btn-primary {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--bg-primary);
}

.btn-primary:hover {
    box-shadow: var(--shadow-gold);
    transform: translateY(-1px);
}

.dish-unavailable {
    opacity: 0.6;
    filter: grayscale(0.5);
    pointer-events: none;
}

.dish-unavailable .dish-badge-unavailable {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(248, 113, 113, 0.2);
    color: var(--accent-red);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: var(--radius-xl);
}

.empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-muted);
}

.empty-state h3 {
    font-family: var(--font-heading);
    font-size: 1.3rem;
    color: var(--text-secondary);
    margin-bottom: 0.5rem;
}

.section-personalized {
    background: radial-gradient(circle at top right, rgba(201, 169, 110, 0.05), transparent 40%);
    position: relative;
}

.section-personalized::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 10%;
    right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-gold), transparent);
}

.section-personalized .dish-card {
    background: rgba(255, 255, 255, 0.03);
    border-color: rgba(201, 169, 110, 0.15);
}

.section-personalized .dish-card:hover {
    background: rgba(201, 169, 110, 0.05);
    border-color: var(--gold);
    box-shadow: 0 8px 32px rgba(201, 169, 110, 0.1);
}

@media (max-width: 1100px) {
    .dishes-grid {
        grid-template-columns: 1fr;
    }

    .section-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
    }
}

@media (max-width: 768px) {
    .section {
        padding: 1.5rem 0;
    }

    .section-header {
        margin-bottom: 1rem;
    }

    .section-title {
        font-size: 1.5rem;
    }

    .dishes-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
    }

    .dish-card {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 0;
    }

    .dish-image-container {
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
        min-width: 100%;
        margin: 0;
        border-radius: 0;
        align-self: center;
    }

    .dish-card-header {
        margin-top: 0.4rem !important;
        margin-bottom: 0.15rem !important;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: baseline;
        gap: 0.5rem;
    }

    .dish-card-header .dish-price {
        padding-left: 0;
        font-size: 1.55rem;
        margin-top: 0;
    }

    .dish-card-content {
        flex: none;
        display: flex;
        flex-direction: column;
        gap: 0.35rem !important;
        padding: 0.85rem 1rem !important;
        min-width: 0;
    }

    .dish-description {
        font-size: 1.1rem;
        margin-bottom: 0.2rem !important;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.5;
    }

    .dish-tags {
        gap: 4px;
        margin-bottom: 0.35rem !important;
    }

    .dish-tag {
        font-size: 1.1rem;
        padding: 6px 16px;
    }

    .dish-actions {
        margin-top: 0.25rem;
    }

    .dish-name {
        font-size: 1.45rem;
        font-weight: 700;
        margin-bottom: 0;
        white-space: normal;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
    }

    .dish-badge-unavailable {
        font-size: 0.75rem;
        padding: 4px 10px;
    }
}

@media (max-width: 480px) {
    .container {
        padding: 0 1rem;
    }

    .section {
        padding: 2rem 0;
    }
}
</style>
</th:block>
