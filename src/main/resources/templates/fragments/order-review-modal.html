<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="reviewOverlay" id="reviewModalOverlay" class="modal-overlay active">
    <div class="modal review-modal-container">
        <div class="modal-header">
            <div>
                <h3 class="modal-title">Залишити відгук</h3>
                <div class="modal-review-id" th:text="|Замовлення #${order.id}|">#0</div>
            </div>
            <button type="button" class="modal-close" id="reviewModalCloseBtn">&#x2715;</button>
        </div>
        <div class="modal-body">
            <div class="review-modal-row">
                <div class="form-label">Сервіс:</div>
                <div class="star-picker" data-type="service"></div>
            </div>
            <div class="form-group mt-2">
                <label class="form-label">Побажання (опціонально):</label>
                <textarea class="form-textarea" id="reviewModalComment" rows="2"
                          placeholder="Наприклад: все було супер, дякуємо!"></textarea>
            </div>
            <div class="mt-2">
                <div class="form-label">Страви:</div>
                <th:block th:if="${order.items != null and !order.items.isEmpty()}">
                    <div th:each="i : ${order.items}" class="review-modal-row">
                        <div class="text-sm" th:text="${i.dishName}">—</div>
                        <div class="star-picker" data-type="dish" th:attr="data-dish-id=${i.dishId}"></div>
                    </div>
                </th:block>
                <div class="text-muted text-sm" th:if="${order.items == null or order.items.isEmpty()}">Немає страв для оцінки</div>
            </div>
            <button type="button" class="btn btn-primary w-full mt-2" id="reviewModalSubmitBtn">&#x2705; Надіслати відгук</button>
            <div class="text-muted text-sm mt-1" id="reviewModalHint"></div>
        </div>
    </div>
</div>
</body>
</html>
