<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="categoryBodies">
    <th:block th:each="menu, stat : ${menus}">
        <div class="menu-category fade-in-up"
             th:data-menu-id="${menu.id}"
             th:style="'animation-delay:' + ${stat.index * 0.1} + 's'">

            <!-- Title: H3 for index/overview, H2 for main menu page -->
            <h3 class="menu-category-title" th:if="${menuView == 'index'}">
                <span th:text="${menu.name}">Category</span>
                <span class="menu-category-time"
                      th:if="${menu.startTime != null && menu.endTime != null}"
                      th:text="${#temporals.format(menu.startTime, 'HH:mm')} + ' ‚Äî ' + ${#temporals.format(menu.endTime, 'HH:mm')}">
                </span>
            </h3>
            <h2 class="menu-category-title" th:if="${menuView != 'index'}">
                <span th:text="${menu.name}">Category</span>
                <span class="menu-category-time"
                      th:if="${menu.startTime != null && menu.endTime != null}"
                      th:text="'&#128336; ' + ${#temporals.format(menu.startTime, 'HH:mm')} + ' ‚Äî ' + ${#temporals.format(menu.endTime, 'HH:mm')}">
                </span>
            </h2>

            <div class="dishes-grid" th:if="${menu.dishes != null && !menu.dishes.isEmpty()}">
                <th:block th:each="dish, dishStat : ${menu.dishes}">
                    <th:block th:with="imgLoading=${stat.index == 0 and dishStat.index < 3 ? 'eager' : 'lazy'},
                                       imgFetchPriority=${stat.index == 0 and dishStat.index < 3 ? 'high' : 'auto'}"
                              th:replace="~{fragments/dish-card :: dishCard(
                                    dish=${dish},
                                    stat=${dishStat},
                                    hasActivePaidOrder=${hasActivePaidOrder},
                                    headerMb=${false},
                                    cardExtraClass='',
                                    inlineStyle=${null},
                                    imgLoading=${imgLoading},
                                    imgFetchPriority=${imgFetchPriority},
                                    placeholderIcons=${true},
                                    buttonAriaLabel=${'–î–æ–¥–∞—Ç–∏ ' + dish.name + ' —É –∫–æ—à–∏–∫'}
                              )}">
                    </th:block>
                </th:block>
            </div>

            <p class="text-muted mt-1"
               th:if="${menuView == 'index' and (menu.dishes == null || menu.dishes.isEmpty())}">
                –£ —Ü—ñ–π –∫–∞—Ç–µ–≥–æ—Ä—ñ—ó –ø–æ–∫–∏ –Ω–µ–º–∞—î —Å—Ç—Ä–∞–≤
            </p>
            <div class="empty-state p-3"
                 th:if="${menuView == 'menu' and (menu.dishes == null || menu.dishes.isEmpty())}">
                <p class="text-muted">–£ —Ü—ñ–π –∫–∞—Ç–µ–≥–æ—Ä—ñ—ó –ø–æ–∫–∏ –Ω–µ–º–∞—î —Å—Ç—Ä–∞–≤</p>
            </div>
        </div>
    </th:block>
</th:block>
</body>
</html>
