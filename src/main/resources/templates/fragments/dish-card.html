<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="dishCard(dish, stat, hasActivePaidOrder, headerMb, cardExtraClass, inlineStyle, imgLoading, imgFetchPriority, placeholderIcons, buttonAriaLabel, isLcp)">
    <div class="dish-card"
         th:classappend="${((cardExtraClass != null && !cardExtraClass.isEmpty()) ? (' ' + cardExtraClass) : '') + ((dish.isAvailable != null && !dish.isAvailable) ? ' dish-unavailable' : '')}"
         th:style="${inlineStyle != null ? inlineStyle : ''}">

        <div th:if="${dish.isAvailable != null && !dish.isAvailable}" class="dish-badge-unavailable">Недоступно</div>

        <div class="dish-image-container">
            <img th:if="${dish.imageUrl != null && !dish.imageUrl.isEmpty()}"
                 th:with="base=${dish.imageUrl.endsWith('.webp') ? dish.imageUrl.substring(0, dish.imageUrl.length() - 5) : dish.imageUrl}"
                 th:src="${dish.imageUrl}"
                 th:srcset="${base + '-w320.webp 320w, ' + base + '-w480.webp 480w, ' + base + '-w640.webp 640w, ' + base + '-w800.webp 800w'}"
                 th:alt="${dish.name}"
                 width="800"
                 height="600"
                 th:loading="${isLcp != null && isLcp ? 'eager' : imgLoading}"
                 th:attr="fetchpriority=${isLcp != null && isLcp ? 'high' : imgFetchPriority}"
                 decoding="async"
                 sizes="(max-width: 600px) 92vw, (max-width: 1100px) 96vw, 390px"
                 class="dish-image">
            <div th:unless="${dish.imageUrl != null && !dish.imageUrl.isEmpty()}" class="dish-image-placeholder">
                <th:block th:if="${placeholderIcons}">
                    <span th:if="${dish.tags != null && dish.tags.contains('meat')}">&#129385;</span>
                    <span th:if="${dish.tags != null && dish.tags.contains('seafood')}">&#128031;</span>
                    <span th:if="${dish.tags != null && dish.tags.contains('sweet')}">&#127856;</span>
                    <span th:if="${dish.tags != null && dish.tags.contains('drink')}">&#127865;</span>
                    <span th:unless="${dish.tags != null && (dish.tags.contains('meat') || dish.tags.contains('seafood') || dish.tags.contains('sweet') || dish.tags.contains('drink'))}">&#127869;&#65039;</span>
                </th:block>
                <th:block th:unless="${placeholderIcons}">
                    <span>Dish</span>
                </th:block>
            </div>
        </div>

        <div class="dish-card-content">
            <div class="dish-card-header" th:classappend="${headerMb} ? ' mb-1' : ''">
                <span class="dish-name" th:text="${dish.name}">Страва</span>
                <span class="dish-price" th:text="${#numbers.formatDecimal(dish.price, 1, 2)} + ' ₴'">0.00 ₴</span>
            </div>
            <div class="dish-meta d-flex align-center justify-between text-sm mb-1">
                <div>
                    <span class="dish-rating" th:if="${dish.ratingsCount != null && dish.ratingsCount > 0}">
                        ★ <span th:text="${#numbers.formatDecimal(dish.avgRating, 1, 1)}">0.0</span>
                        <span th:text="'(' + ${dish.ratingsCount} + ')'">(0)</span>
                    </span>
                    <span class="dish-rating" th:if="${dish.ratingsCount == null || dish.ratingsCount == 0}">
                        ★ Немає оцінок
                    </span>
                </div>
                <div class="dish-time text-muted" th:if="${dish.preparationTime != null}" title="Орієнтовний час приготування">
                    ⏱️ <span th:text="${dish.preparationTime} + ' хв'">15 хв</span>
                </div>
            </div>
            <p class="dish-description" th:text="${dish.description}">Опис</p>
            <div class="dish-tags" th:if="${dish.tags != null && !dish.tags.isEmpty()}">
                <span class="dish-tag" th:each="tag : ${dish.tags}" th:text="${tag}">tag</span>
            </div>
            <div class="dish-allergens" th:if="${dish.allergens != null && !dish.allergens.isEmpty()}">
                <span class="dish-allergen" th:each="a : ${dish.allergens}" th:text="${a}">allergen</span>
            </div>
            <div class="dish-actions">
                <form hx-post="/htmx/cart/items" hx-swap="none">
                    <input type="hidden" name="dishId" th:value="${dish.id}">
                    <input type="hidden" name="quantity" value="1">
                    <input type="hidden" name="specialRequest" value="">
                    <button class="btn btn-primary add-to-cart-btn"
                            type="submit"
                            th:disabled="${hasActivePaidOrder}"
                            th:attr="aria-label=${buttonAriaLabel}">
                        🛒 У кошик
                    </button>
                </form>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
