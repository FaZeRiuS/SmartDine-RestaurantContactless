<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="webFonts">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Non-render-blocking: avoids chaining document → fonts.googleapis.com → fonts.gstatic.com on critical path. -->
    <link rel="preload" as="style"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Montserrat:wght@600;700;800&amp;family=Oswald:wght@500;600;700&amp;display=swap"
          onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet"
              href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Montserrat:wght@600;700;800&amp;family=Oswald:wght@500;600;700&amp;display=swap">
    </noscript>
</th:block>
