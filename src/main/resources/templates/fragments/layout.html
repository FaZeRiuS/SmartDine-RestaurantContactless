<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(pageTitle, pageDescription)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null && !#strings.isEmpty(pageTitle) ? pageTitle + ' — SmartDine' : 'SmartDine — Безконтактне замовлення'}">SmartDine</title>
    <meta name="description" th:content="${pageDescription != null && !#strings.isEmpty(pageDescription) ? pageDescription : 'SmartDine — система безконтактного замовлення страв у ресторані через QR-код'}">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SmartDine">
    
    <!-- NOTE: External webfonts can introduce CLS via late font swaps.
         We intentionally rely on system fonts for layout stability. -->
    
    <!-- Preload Critical CSS -->
    <link rel="preload" th:href="@{/images/logo.webp}" as="image" fetchpriority="high" type="image/webp">
    <th:block th:if="${lcpImagePreconnectOrigin != null}">
        <link rel="preconnect" th:href="${lcpImagePreconnectOrigin}" crossorigin>
        <link rel="dns-prefetch" th:href="${'//' + #strings.substringAfter(lcpImagePreconnectOrigin, '://')}">
    </th:block>
    <th:block th:if="${lcpImageUrl != null}">
        <link rel="preload" as="image" th:href="${lcpImageUrl}" fetchpriority="high"
              th:attr="crossorigin=${lcpImageCrossorigin} ? 'anonymous' : null">
    </th:block>
    <link rel="preload" th:href="@{/css/base.css(v=1.5)}" as="style">
    <link rel="preload" th:href="@{/css/layout.css(v=1.5)}" as="style">
    <link rel="preload" th:href="@{/css/pages.css(v=1.5)}" as="style">
    
    <link rel="apple-touch-icon" th:href="@{/icons/apple-touch-icon.png}">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/icons/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/icons/favicon-16x16.png}">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link rel="manifest" th:href="@{/manifest.json(v=1.4)}">
    
    <!-- Critical CSS (sync, already preloaded) -->
    <link rel="stylesheet" th:href="@{/css/base.css(v=1.5)}">
    <link rel="stylesheet" th:href="@{/css/layout.css(v=1.5)}">
    <link rel="stylesheet" th:href="@{/css/pages.css(v=1.5)}">

    <!-- Non-critical CSS (async, non-blocking) -->
    <link rel="stylesheet" media="print" onload="this.media='all'" th:href="@{/css/components.css(v=1.5)}">
    <noscript><link rel="stylesheet" th:href="@{/css/components.css(v=1.5)}"></noscript>

    <link rel="stylesheet" media="print" onload="this.media='all'" th:href="@{/css/responsive.css(v=1.5)}">
    <noscript><link rel="stylesheet" th:href="@{/css/responsive.css(v=1.5)}"></noscript>

    <link rel="stylesheet" media="print" onload="this.media='all'"
          th:href="@{/css/admin.css(v=1.5)}" sec:authorize="hasAnyRole('WAITER','CHEF','ADMINISTRATOR')">
    <noscript>
        <link rel="stylesheet" th:href="@{/css/admin.css(v=1.5)}" sec:authorize="hasAnyRole('WAITER','CHEF','ADMINISTRATOR')">
    </noscript>

    <link rel="stylesheet" media="print" onload="this.media='all'"
          th:href="@{/css/dashboard.css(v=1.5)}" sec:authorize="hasRole('ADMINISTRATOR')">
    <noscript>
        <link rel="stylesheet" th:href="@{/css/dashboard.css(v=1.5)}" sec:authorize="hasRole('ADMINISTRATOR')">
    </noscript>
</head>
<body>

<!-- ═══ HEADER FRAGMENT ═══ -->
<nav class="navbar" th:fragment="header">
    <div class="navbar-inner">
        <a class="navbar-brand" th:href="@{/}">
            <picture>
                <source th:srcset="@{/images/logo.webp}" type="image/webp">
                <img th:src="@{/images/logo.webp}" alt="SmartDine" class="brand-logo" fetchpriority="high" width="200" height="38">
            </picture>
        </a>

        <ul class="navbar-nav" id="mainNav">
            <li><a th:href="@{/}" th:classappend="${currentUri == '/' ? 'active' : ''}">Головна</a></li>
            <li><a th:href="@{/menu}" th:classappend="${currentUri == '/menu' ? 'active' : ''}">Меню</a></li>
            <li><a th:href="@{/cart}" th:classappend="${currentUri == '/cart' ? 'active' : ''}">Кошик</a></li>
        </ul>

        <!-- Right-side Auth/Profile Icons -->
        <div class="header-actions">
            <!-- Login for Guest -->
            <a th:href="@{/oauth2/authorization/keycloak}" class="header-icon-btn" sec:authorize="!isAuthenticated()" aria-label="Увійти">
                <span class="header-btn-text">Увійти</span>
            </a>
            
            <!-- Desktop Profile (Visible on PC) -->
            <div class="header-profile-desktop" sec:authorize="isAuthenticated()">
                <div class="loyalty-badge-header" sec:authorize="hasRole('CUSTOMER')">
                    <span class="loyalty-balance-text"><span class="js-header-loyalty-balance" th:text="${loyaltyBalance != null ? #numbers.formatDecimal(loyaltyBalance, 1, 2) : '—'}">—</span> ₴</span>
                    <span class="loyalty-cashback-text">(<span class="js-header-cashback-rate" th:text="${cashbackRate != null ? #numbers.formatInteger(cashbackRate * 100, 1) : '1'}">1</span>%)</span>
                </div>
                <a th:href="@{/profile}" class="header-profile-btn">
                    <div class="nav-user-avatar" 
                         th:text="${#strings.substring(username != null ? username : (#authentication.name != 'anonymousUser' ? #authentication.name : 'U'), 0, 1).toUpperCase()}">U</div>
                    <span class="header-btn-text" th:text="${username != null ? username : #authentication.name}">User</span>
                </a>
            </div>
            
            <div class="burger-menu-container" sec:authorize="isAuthenticated()" x-data="{ open: false }">
                <button class="menu-toggle"
                        type="button"
                        aria-label="Меню"
                        @click.stop="open = !open"
                        x-text="open ? '✕' : '☰'">☰</button>
                
                <ul class="navbar-burger"
                    :class="open ? 'open' : ''"
                    @click="open = false"
                    @click.outside="open = false">
                    <!-- User Info Section (Burger) -->
                    <li class="burger-user-info">
                        <a th:href="@{/profile}" class="header-profile-btn">
                            <div class="nav-user-avatar" 
                                 th:text="${#strings.substring(username != null ? username : (#authentication.name != 'anonymousUser' ? #authentication.name : 'U'), 0, 1).toUpperCase()}">U</div>
                            <span class="header-btn-text" th:text="${username != null ? username : #authentication.name}">User</span>
                        </a>
                        <div class="loyalty-badge-header" sec:authorize="hasRole('CUSTOMER')">
                            <span class="loyalty-balance-text"><span class="js-header-loyalty-balance" th:text="${loyaltyBalance != null ? #numbers.formatDecimal(loyaltyBalance, 1, 2) : '—'}">—</span> ₴</span>
                            <span class="loyalty-cashback-text">(<span class="js-header-cashback-rate" th:text="${cashbackRate != null ? #numbers.formatInteger(cashbackRate * 100, 1) : '1'}">1</span>%)</span>
                        </div>
                    </li>
                    <li class="nav-divider"></li>

                    <!-- Authenticated links -->
                    <li sec:authorize="hasRole('CUSTOMER') and !hasAnyRole('WAITER','CHEF','ADMINISTRATOR')">
                        <a th:href="@{/orders}" th:classappend="${currentUri == '/orders' ? 'active' : ''}">Мої замовлення</a>
                    </li>

                    <li sec:authorize="hasAnyRole('WAITER','CHEF','ADMINISTRATOR')">
                        <a th:href="@{/staff/orders}" th:classappend="${currentUri.startsWith('/staff') ? 'active' : ''}">Замовлення</a>
                    </li>

                    <li sec:authorize="hasAnyRole('CHEF','ADMINISTRATOR')">
                        <a th:href="@{/admin/menu}" th:classappend="${currentUri == '/admin/menu' ? 'active' : ''}">Редактор меню</a>
                    </li>

                    <li sec:authorize="hasRole('ADMINISTRATOR')">
                        <a th:href="@{/admin/dashboard}" th:classappend="${currentUri == '/admin/dashboard' ? 'active' : ''}">Dashboard</a>
                    </li>

                    <li class="nav-divider"></li>
                    <li>
                        <form th:action="@{/logout}" method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="logout-btn" aria-label="Вийти з акаунта">Вийти</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>
        </div>
    </div>
</nav>

<!-- ═══ MOBILE NAVIGATION FRAGMENT ═══ -->
<div class="mobile-nav" th:fragment="mobile-nav">
    <a th:href="@{/}" class="mobile-nav-item" th:classappend="${currentUri == '/' ? 'active' : ''}">
        <span class="mobile-nav-icon">🏠</span>
        <span class="mobile-nav-label">Головна</span>
    </a>
    <a th:href="@{/menu}" class="mobile-nav-item" th:classappend="${currentUri == '/menu' ? 'active' : ''}">
        <span class="mobile-nav-icon">📋</span>
        <span class="mobile-nav-label">Меню</span>
    </a>

    <a th:href="@{/cart}" class="mobile-nav-item" th:classappend="${currentUri == '/cart' ? 'active' : ''}">
        <span class="mobile-nav-icon">
            🛒
            <span class="cart-badge-mobile"
                  id="mobile-cart-count"
                  hx-get="/htmx/cart/widget"
                          hx-trigger="load"
                  hx-swap="none">0</span>
        </span>
        <span class="mobile-nav-label">Кошик</span>
    </a>
    <a th:href="@{/orders}" class="mobile-nav-item" th:classappend="${currentUri == '/orders' ? 'active' : ''}"
       sec:authorize="hasRole('CUSTOMER') and !hasAnyRole('WAITER','CHEF','ADMINISTRATOR')">
        <span class="mobile-nav-icon">🧾</span>
        <span class="mobile-nav-label">Замовлення</span>
    </a>
    <a th:href="@{/staff/orders}" class="mobile-nav-item" th:classappend="${currentUri.startsWith('/staff') ? 'active' : ''}" sec:authorize="hasAnyRole('WAITER','CHEF','ADMINISTRATOR')">
        <span class="mobile-nav-icon">⚙️</span>
        <span class="mobile-nav-label">Замовлення</span>
    </a>
</div>

<!-- ═══ FOOTER FRAGMENT ═══ -->
<footer class="footer" th:fragment="footer">
    <p>&copy; 2026 <span class="footer-brand">SmartDine</span> — Безконтактне замовлення у ресторані</p>
    <div th:replace="~{fragments/layout :: mobile-nav}"></div>
</footer>

<!-- ═══ SCRIPTS FRAGMENT ═══ -->
<div th:fragment="scripts">
    <!-- Toast Notifications (OOB & JS) -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Order/staff notifications -->
    
    <!-- Scripts -->
    <script th:inline="javascript">
        window.vapidPublicKey = /*[[${vapidPublicKey}]]*/ null;
        window.isAuthenticated = /*[[${#authentication.name != 'anonymousUser'}]]*/ false;
        window.isCustomer = /*[[${#authorization.expression('hasRole(''CUSTOMER'')')}]]*/ false;
        window.__CLIENT_DEBUG = (function () {
            try { return localStorage.getItem('debug') === '1'; } catch (e) { return false; }
        })();
    </script>
    
    <!-- Alpine.js -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    
    <!-- HTMX & Extensions -->
    <script src="https://unpkg.com/htmx.org@1.9.11" defer></script>
    <script src="https://unpkg.com/htmx.org@1.9.11/dist/ext/sse.js" defer></script>

    <!-- Premium emoji rendering (SVG, consistent across platforms) -->
    <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" defer></script>
    
    <script th:src="@{/js/csrf.js(v=1.5)}" defer></script>
    <script th:src="@{/js/ui.js(v=1.5)}" defer></script>
    <script th:src="@{/js/htmx-bridge.js(v=1.5)}" defer></script>
    <script th:src="@{/js/cart.js(v=1.5)}" defer></script>
    <script th:src="@{/js/sse.js(v=1.5)}" defer></script>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', async function() {
            function parseEmojis(root) {
                try {
                    if (!window.twemoji || typeof window.twemoji.parse !== 'function') return;
                    window.twemoji.parse(root || document.body, { folder: 'svg', ext: '.svg', className: 'twemoji' });
                } catch (e) { /* ignore */ }
            }
            function scheduleEmojiParse(root) {
                const fn = function () { parseEmojis(root); };
                if (typeof window.requestIdleCallback === 'function') {
                    window.requestIdleCallback(fn, { timeout: 1500 });
                } else {
                    window.setTimeout(fn, 600);
                }
            }

            // 1. Warm up CSRF
            if (window.__csrf && typeof window.__csrf.ensure === 'function') {
                window.__csrf.ensure().catch(function () { /* ignore */ });
            }

            // 2. Service Worker: register and wait until install precache + activate finish.
            //    Otherwise push/bootstrap can run before the SW is active and caching is done.
            if ('serviceWorker' in navigator) {
                try {
                    const swPath = window.__CLIENT_DEBUG ? '/sw.js?debug=1' : '/sw.js';
                    const reg = await navigator.serviceWorker.register(swPath);
                    // Playwright E2E uses serviceWorkers: "block" — register is stubbed and returns no registration;
                    // navigator.serviceWorker.ready would never resolve, so bootstrap (SSE, etc.) must not wait on it.
                    if (reg && typeof reg.scope === 'string') {
                        await navigator.serviceWorker.ready;
                        if (window.__CLIENT_DEBUG) {
                            console.log('>>> PWA: Service Worker ready (precache + activate)', reg.scope);
                        }
                    }
                } catch (err) {
                    if (window.__CLIENT_DEBUG) {
                        console.error('>>> PWA: SW failed:', err);
                    }
                }
            }

            // 3. Centralized Identity & UI Boot
            async function bootstrapApp() {
                if (window.__CLIENT_DEBUG && typeof console.time === 'function') {
                    console.time('>>> BOOTSTRAP: Total Time');
                }
                try {
                    const res = await fetch('/api/user/me');
                    if (!res.ok) throw new Error('Identity failed');
                    const data = await res.json();
                    
                    window.currentUserId = data.id;
                    if (window.__CLIENT_DEBUG) {
                        console.log('>>> BOOTSTRAP: Identity loaded');
                    }
                    
                    // Initialize components in sequence
                    if (typeof initSharedUI === 'function') initSharedUI();
                    if (typeof initSse === 'function') initSse(data.id);
                    if (typeof window.refreshCartUI === 'function') window.refreshCartUI();
                    if (window.isCustomer && typeof window.updateAddToCartButtonLabels === 'function') {
                        window.updateAddToCartButtonLabels();
                    }
                    scheduleEmojiParse(document.body);
                    
                } catch (err) {
                    if (window.__CLIENT_DEBUG) {
                        console.warn('>>> BOOTSTRAP: Reduced functionality mode:', err && err.message);
                    }
                    if (typeof initSharedUI === 'function') initSharedUI();
                    if (typeof window.refreshCartUI === 'function') window.refreshCartUI();
                    if (window.isCustomer && typeof window.updateAddToCartButtonLabels === 'function') {
                        window.updateAddToCartButtonLabels();
                    }
                    scheduleEmojiParse(document.body);
                } finally {
                    if (window.__CLIENT_DEBUG && typeof console.timeEnd === 'function') {
                        console.timeEnd('>>> BOOTSTRAP: Total Time');
                    }
                }
            }

            await bootstrapApp();

            // Re-parse emojis after HTMX swaps (new fragments injected)
            document.body?.addEventListener('htmx:afterSwap', function (evt) {
                const t = evt && evt.detail ? evt.detail.target : null;
                scheduleEmojiParse(t || document.body);
            });

            // Ensure OOB-swapped fragments (like toasts) also get parsed.
            document.body?.addEventListener('htmx:oobAfterSwap', function (evt) {
                const t = evt && evt.detail ? evt.detail.target : null;
                scheduleEmojiParse(t || document.body);
            });

            // Ensure emojis are parsed even if CDN is slow.
            window.addEventListener('load', function () {
                document.documentElement.classList.add('ui-ready');
                scheduleEmojiParse(document.body);
            });
        });
    </script>
</div>

</body>
</html>
