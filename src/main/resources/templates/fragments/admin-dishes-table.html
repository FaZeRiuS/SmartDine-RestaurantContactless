<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="dishesTable_with_toast">
    <th:block th:if="${toastMessage != null and !toastMessage.isBlank()}">
        <th:block th:replace="~{fragments/toast :: oobToast(message=${toastMessage}, toastType=${toastType})}"></th:block>
    </th:block>
    <div th:replace="~{fragments/admin-dishes-table :: dishesTable}"></div>
</div>

<div th:fragment="dishesTable">
    <table class="data-table" id="dishesTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Назва</th>
            <th>Ціна</th>
            <th>Доступно</th>
            <th>Теги</th>
            <th>Дії</th>
        </tr>
        </thead>
        <tbody id="dishesTableBody">
        <tr th:if="${dishes == null or dishes.isEmpty()}">
            <td colspan="6" class="text-muted">Страв ще немає. Додайте першу через «Нова страва».</td>
        </tr>
        <tr th:each="dish : ${dishes}">
            <td class="data-table-id" th:text="${dish.id}">0</td>
            <td class="fw-600 color-text-primary" th:text="${dish.name}">—</td>
            <td class="data-table-price"
                th:utext="${#numbers.formatDecimal(dish.price, 1, 2)} + ' &#x20B4;'">0.00</td>
            <td>
                <span th:if="${dish.isAvailable != false}" class="data-table-available-yes">✅</span>
                <span th:if="${dish.isAvailable == false}" class="data-table-available-no">❌</span>
            </td>
            <td>
                <div class="dish-tags m-0" th:if="${dish.tags != null and !dish.tags.isEmpty()}">
                    <span class="dish-tag" th:each="tag : ${dish.tags}" th:text="${tag}">tag</span>
                </div>
                <span class="text-muted" th:if="${dish.tags == null or dish.tags.isEmpty()}">—</span>
            </td>
            <td>
                <div class="d-flex gap-1">
                    <button type="button" class="btn btn-secondary btn-sm"
                            th:attr="onclick=|openDishModalById(${dish.id})|"
                            aria-label="Редагувати страву">✏️</button>
                    <button type="button" class="btn btn-danger btn-sm"
                            th:attr="hx-delete=|/htmx/admin/dishes/${dish.id}|,
                                     hx-target='#adminDishesRoot',
                                     hx-swap='innerHTML',
                                     hx-confirm='Видалити цю страву?'"
                            aria-label="Видалити страву">🗑️</button>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
