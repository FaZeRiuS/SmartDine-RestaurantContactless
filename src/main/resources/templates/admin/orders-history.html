<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Історія замовлень — SmartDine</title>
    <meta name="description" content="Повна історія замовлень ресторану SmartDine">
        <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/pages.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}" sec:authorize="hasAnyRole('WAITER','CHEF','ADMINISTRATOR')">
</head>
<body>

<div th:replace="~{fragments/layout :: header}"></div>

<main>

<section class="section">
    <div class="container">
        <div class="section-header">
            <div>
                <h1 class="section-title"><span class="title-accent">��</span> Історія замовлень</h1>
                <p class="section-subtitle">Повний перелік усіх замовлень</p>
            </div>
            <button type="submit" form="adminOrdersFilterForm" class="btn btn-secondary btn-sm" aria-label="Оновити список замовлень">��� Оновити</button>
        </div>

        <form id="adminOrdersFilterForm" class="filters-bar"
              th:attr="hx-get=@{/htmx/admin/orders/table}"
              hx-target="#adminOrdersHistoryRoot"
              hx-trigger="change from:select, submit"
              hx-swap="innerHTML">
            <input type="hidden" name="page" value="0" id="adminOrdersPageField">
            <div>
                <label class="form-label" for="filterStatus">Статус замовлення:</label>
                <select class="form-select" name="status" id="filterStatus"
                        onchange="document.getElementById('adminOrdersPageField').value='0';"
                        aria-label="Фільтрувати за статусом замовлення">
                    <option value="">Усі</option>
                    <option value="NEW">Нові</option>
                    <option value="PREPARING">Готуються</option>
                    <option value="READY">Готові</option>
                    <option value="COMPLETED">Завершені</option>
                    <option value="CANCELLED">Скасовані</option>
                </select>
            </div>
            <div>
                <label class="form-label" for="filterPayment">Статус оплати:</label>
                <select class="form-select" name="paymentStatus" id="filterPayment"
                        onchange="document.getElementById('adminOrdersPageField').value='0';"
                        aria-label="Фільтрувати за статусом оплати">
                    <option value="">Усі</option>
                    <option value="PENDING">Очікує</option>
                    <option value="SUCCESS">Оплачено</option>
                    <option value="FAILED">Помилка</option>
                </select>
            </div>
        </form>

        <div id="adminOrdersHistoryRoot"
             th:attr="hx-get=@{/htmx/admin/orders/table}"
             hx-trigger="load"
             hx-swap="innerHTML">
            <div class="loading-overlay" id="historyLoading">
                <div class="loading-spinner"></div>
                <span>Завантаження замовлень...</span>
            </div>
        </div>
    </div>
</section>

<!-- Order Detail Modal -->
<div class="modal-overlay" id="orderDetailModal">
    <div class="modal">
        <div class="modal-header">
            <h3 class="modal-title" id="orderDetailTitle">Замовлення</h3>
            <button class="modal-close" onclick="closeModal('orderDetailModal')">��</button>
        </div>
        <div class="modal-body" id="orderDetailBody"></div>
    </div>
</div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div class="toast-container" id="toastContainer"></div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:src="@{/js/orders-history-admin.js}"></script>

</body>
</html>
