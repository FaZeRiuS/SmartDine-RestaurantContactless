<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(pageTitle='Редактор меню', pageDescription='Адміністрування меню та страв ресторану SmartDine')}">
</head>
<body>

<div th:replace="~{fragments/layout :: header}"></div>

<main>

<section class="section">
    <div class="container">
        <div class="section-header">
            <div>
                <h1 class="section-title"><span class="title-accent">✏️</span> Редактор меню</h1>
                <p class="section-subtitle">Створюйте та редагуйте меню та страви</p>
            </div>
        </div>

        <!-- ═══ MENUS PANEL ═══ -->
        <div class="admin-panel">
            <div class="admin-panel-header">
                <h2 class="admin-panel-title">📋 Категорії меню</h2>
                <button class="btn btn-primary btn-sm" onclick="openMenuModal()" aria-label="Створити нову категорію меню">+ Нове меню</button>
            </div>
            <div class="admin-panel-body">
                <div id="adminMenusRoot"
                     th:attr="hx-get=@{/htmx/admin/menus/table}"
                     hx-trigger="load"
                     hx-swap="innerHTML">
                    <div class="loading-overlay" id="menusLoading">
                        <div class="loading-spinner"></div>
                        <span>Завантаження категорій...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ═══ DISHES PANEL ═══ -->
        <div class="admin-panel">
            <div class="admin-panel-header">
                <h2 class="admin-panel-title">🍽 Страви</h2>
                <button class="btn btn-primary btn-sm" onclick="openDishModal()" aria-label="Додати нову страву">+ Нова страва</button>
            </div>
            <div class="admin-panel-body">
                <div id="adminDishesRoot"
                     th:attr="hx-get=@{/htmx/admin/dishes/table}"
                     hx-trigger="load"
                     hx-swap="innerHTML">
                    <div class="loading-overlay" id="dishesLoading">
                        <div class="loading-spinner"></div>
                        <span>Завантаження страв...</span>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>

<!-- ��══ MENU MODAL ��══ -->
<div class="modal-overlay" id="menuModal">
    <div class="modal">
        <div class="modal-header">
            <h3 class="modal-title" id="menuModalTitle">Нове меню</h3>
            <button type="button" class="modal-close" onclick="closeModal('menuModal')">&#10005;</button>
        </div>
        <form id="menuSaveForm"
              method="post"
              action="/htmx/admin/menus"
              hx-post="/htmx/admin/menus"
              hx-target="#adminMenusRoot"
              hx-swap="innerHTML"
              hx-on::afterRequest="if (event.detail.xhr && event.detail.xhr.status >= 200 && event.detail.xhr.status < 300) closeModal('menuModal')"
              hx-disabled-elt="#menuSaveSubmit">
            <input type="hidden" id="menuEditId" name="id">
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="menuName">Назва меню</label>
                    <input type="text" class="form-input" id="menuName" name="name" required placeholder="Наприклад: Основне меню">
                </div>
                <div class="form-group">
                    <div class="form-check">
                        <input type="checkbox" id="menuAllDay" name="allDay" value="true" checked onchange="toggleMenuAllDay()">
                        <label class="form-label mb-0" for="menuAllDay">Весь день (без часових рамок)</label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="menuStartTime">Час початку (необов'язково)</label>
                    <div class="d-flex gap-1">
                        <input type="time" class="form-input" id="menuStartTime" name="startTime" onchange="onMenuTimeChanged()">
                        <button type="button" class="btn btn-secondary btn-sm" onclick="clearMenuTime('start')" aria-label="Очистити час початку">Очистити</button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="menuEndTime">Час закінчення (необов'язково)</label>
                    <div class="d-flex gap-1">
                        <input type="time" class="form-input" id="menuEndTime" name="endTime" onchange="onMenuTimeChanged()">
                        <button type="button" class="btn btn-secondary btn-sm" onclick="clearMenuTime('end')" aria-label="Очистити час закінчення">Очистити</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('menuModal')">Скасувати</button>
                <button type="submit" class="btn btn-primary" id="menuSaveSubmit">&#128190; Зберегти</button>
            </div>
        </form>
    </div>
</div>

<!-- ��══ DISH MODAL ��══ -->
<div class="modal-overlay" id="dishModal">
    <div class="modal">
        <div class="modal-header">
            <h3 class="modal-title" id="dishModalTitle">Нова страва</h3>
            <button type="button" class="modal-close" onclick="closeModal('dishModal')">&#10005;</button>
        </div>
        <form id="dishSaveForm"
              method="post"
              action="/htmx/admin/dishes"
              hx-post="/htmx/admin/dishes"
              hx-target="#adminDishesRoot"
              hx-swap="innerHTML"
              hx-on::afterRequest="if (event.detail.xhr && event.detail.xhr.status >= 200 && event.detail.xhr.status < 300) closeModal('dishModal')"
              hx-disabled-elt="#dishSaveSubmit">
            <input type="hidden" id="dishEditId" name="id">
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="dishName">Назва страви</label>
                    <input type="text" class="form-input" id="dishName" name="name" required placeholder="Наприклад: Стейк з яловичини">
                </div>
                <div class="form-group">
                    <label class="form-label" for="dishDescription">Опис</label>
                    <textarea class="form-textarea" id="dishDescription" name="description" placeholder="Короткий опис страви..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" for="dishPrice">Ціна (&#8372;)</label>
                    <input type="number" class="form-input" id="dishPrice" name="price" step="0.01" min="0" required placeholder="0.00">
                </div>
                <div class="form-group">
                    <label class="form-label" for="dishTags">Теги (через кому)</label>
                    <input type="text" class="form-input" id="dishTags" name="tags" placeholder="meat, spicy, bestseller">
                </div>
                <div class="form-group">
                    <label class="form-label" for="dishMenuIds">Категорії меню (ID через кому)</label>
                    <input type="text" class="form-input" id="dishMenuIds" name="menuIds" placeholder="1, 2, 3">
                </div>

                <div class="form-group">
                    <label class="form-label">Фото страви</label>
                    <div class="dish-upload-container">
                        <!-- Intentionally not HTMX: multipart upload stays on fetch (see admin.js uploadDishImage). -->
                        <input type="file" id="dishImageFile" accept="image/*" class="form-input" style="margin-bottom: 0.5rem;" onchange="uploadDishImage()">
                        <input type="hidden" id="dishImageUrl" name="imageUrl">
                        <div id="dishImagePreview" class="mt-1" style="display: none;">
                            <img src="" alt="Preview" style="max-width: 100%; border-radius: 12px; border: 1px solid var(--border);">
                            <button class="btn btn-danger btn-sm mt-1" type="button" onclick="removeDishImage()">Видалити фото</button>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <div class="form-check">
                        <input type="checkbox" id="dishAvailable" name="isAvailable" value="true" checked>
                        <label class="form-label mb-0" for="dishAvailable">Доступна для замовлення</label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('dishModal')">Скасувати</button>
                <button type="submit" class="btn btn-primary" id="dishSaveSubmit">&#128190; Зберегти</button>
            </div>
        </form>
    </div>
</div>

</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:src="@{/js/admin.js}"></script>

</body>
</html>
