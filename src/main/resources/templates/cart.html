<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кошик — SmartDine</title>
    <meta name="description" content="Ваш кошик замовлення у SmartDine">
        <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/pages.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}" sec:authorize="hasAnyRole('WAITER','CHEF','ADMINISTRATOR')">
</head>
<body>

<div th:replace="~{fragments/layout :: header}"></div>

<main>

<section class="section">
    <div class="container cart-container">
        <div class="section-header">
            <div>
                <h1 class="section-title"><span class="title-accent">🛒</span> Ваш кошик</h1>
                <p class="section-subtitle">
                    Перегляньте обрані страви та оформіть замовлення
                    <span th:if="${tableNumber != null}" class="table-badge">
                         • Стіл №[[${tableNumber}]]
                    </span>
                </p>
            </div>
        </div>

        <div id="activeOrderContainer"
             class="hidden mb-3"
             hx-get="/htmx/orders/active-panel"
             hx-trigger="load"
             hx-swap="innerHTML"></div>

        <div id="cartSuppressedHint" class="cart-summary p-1 mb-2 hidden">
            <div class="fw-800 mb-1">Активне замовлення</div>
            <div class="text-muted text-sm">
                У вас вже є активне замовлення. Додавання страв зараз відбувається прямо в нього,
                тому кошик може виглядати порожнім.
            </div>
            <div class="text-muted text-xs mt-1">
                Після завершення/оплати замовлення кошик знову буде доступний.
            </div>
        </div>

        <!-- Cart content (Server-Driven UI via Thymeleaf fragments + HTMX) -->
        <div th:replace="~{fragments/cart :: content}"></div>
    </div>
</main>

<div th:replace="~{fragments/layout :: mobile-nav}"></div>
<div th:replace="~{fragments/layout :: footer}"></div>
    <!-- Scripts: identity + SSE notifications (sse.js) -->
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
