spring.application.name=CourseWork
server.port=8081

# Disable Swagger/OpenAPI endpoints by default (production-safe).
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/restaurant_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.defer-datasource-initialization=false
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway migrations (DB schema is managed via SQL migrations)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Keycloak OAuth2 Configuration
spring.security.oauth2.client.registration.keycloak.client-id=restaurant-client
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.keycloak.client-name=Keycloak
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code

keycloak.internal-url=${KEYCLOAK_INTERNAL_URL:${KEYCLOAK_AUTH_SERVER_URL:http://keycloak:8080}}
keycloak.public-url=${KEYCLOAK_PUBLIC_URL:${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080}}

# OIDC discovery (needed for end-session endpoint / full logout)
spring.security.oauth2.client.provider.keycloak.issuer-uri=${keycloak.public-url}/realms/restaurant-realm

# Browser-facing authorization endpoint (public Keycloak URL)
spring.security.oauth2.client.provider.keycloak.authorization-uri=${keycloak.public-url}/realms/restaurant-realm/protocol/openid-connect/auth
# Server-to-server endpoints (internal Keycloak URL)
spring.security.oauth2.client.provider.keycloak.token-uri=${keycloak.internal-url}/realms/restaurant-realm/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.user-info-uri=${keycloak.internal-url}/realms/restaurant-realm/protocol/openid-connect/userinfo
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=${keycloak.internal-url}/realms/restaurant-realm/protocol/openid-connect/certs
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username

logging.level.org.springframework.security=INFO
logging.level.org.springframework.security.oauth2=INFO
logging.level.org.springframework.web=INFO

# Recommended for production when behind HTTPS reverse proxy (nginx/traefik)
server.forward-headers-strategy=native
server.tomcat.internal-proxies=.*

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=true

# Frontend URLs
frontend.menu.url=${FRONTEND_MENU_URL:http://localhost:8081/menu?id=}

# LiqPay Payment Gateway (sandbox mode)
# Replace with real keys from https://www.liqpay.ua/
liqpay.public.key=${LIQPAY_PUBLIC_KEY:}
liqpay.private.key=${LIQPAY_PRIVATE_KEY:}
liqpay.sandbox=${LIQPAY_SANDBOX:0}

# Public base URL (used for payment result_url/server_url callbacks)
# For local dev with webhooks use ngrok, e.g. https://<id>.ngrok-free.app
app.public.base-url=${APP_PUBLIC_BASE_URL:http://localhost:8081}

# Application time zone (used for time-based menus and other time calculations)
app.time-zone=${APP_TIME_ZONE:Europe/Kyiv}

# CORS: allowed Origin patterns for cross-origin browser requests (API, OAuth redirects, fetch from another port/host).
# Same-origin page + SSE does not rely on this; set APP_ALLOWED_ORIGINS when the UI or API is on another origin.
app.cors.allowed-origins=${APP_ALLOWED_ORIGINS:http://localhost:8081}

# Web Push VAPID Settings (Valid P-256 keys)
vapid.public.key=${VAPID_PUBLIC_KEY:}
vapid.private.key=${VAPID_PRIVATE_KEY:}
vapid.subject=${VAPID_SUBJECT:mailto:admin@smartdine.com}

# Performance Optimization (Improving TTFB & Size)
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=1024

# Security: Cookie Flags
server.servlet.session.cookie.name=SMARTDINE_SESSION
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.path=/
server.servlet.session.cookie.http-only=true

# Static Resource Caching (Improving repeat TTFB/Load speed)
spring.web.resources.cache.period=31536000
spring.web.resources.cache.cachecontrol.max-age=31536000

# Optimization: Tomcat/Undertow specific
server.tomcat.mbeanregistry.enabled=false

# Long-lived SSE: avoid servlet async cutting the stream before SseEmitter timeout (some stacks default ~30s).
spring.mvc.async.request-timeout=1h

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
