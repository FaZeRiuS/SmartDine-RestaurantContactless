spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enable Swagger/OpenAPI endpoints in dev.
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.com.example.CourseWork.security=DEBUG

# Dev: expose error details to simplify debugging
app.errors.expose-details=true

# Dev: secrets should still come from env (.env). No hardcoded defaults.
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:}

# Dev: LiqPay sandbox keys come from env (.env)
liqpay.public.key=${LIQPAY_PUBLIC_KEY:}
liqpay.private.key=${LIQPAY_PRIVATE_KEY:}
liqpay.sandbox=1

# Dev origins
app.public.base-url=${APP_PUBLIC_BASE_URL:http://localhost:8081}
app.cors.allowed-origins=http://localhost:8081,http://localhost:8080

# Security Overrides for local dev (Fixes Keycloak Login over HTTP)
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax

